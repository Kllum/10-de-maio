<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Antes de Continuar</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{
width:100%;
height:100%;
overflow:hidden;
background:#060818;
color:#fff;
font-family:Georgia,serif;
position:fixed;
inset:0;
}

.page{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
}

.page.active{display:flex;}

button{
background:none;
border:none;
border-bottom:1px solid rgba(255,255,255,.4);
color:white;
letter-spacing:3px;
padding:8px;
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="page-home" class="page active">
<button id="btn-comecar">começar</button>
</div>

<!-- PAGE 2 -->
<div id="page-experiencia" class="page">
<button id="btn-respirar">segure para respirar</button>
<button id="btn-continuar">continuar →</button>
</div>

<!-- PAGE 3 -->
<div id="page-memoria" class="page">
<p>toque na tela</p>
</div>

<!-- PAGE 4 -->
<div id="page-final" class="page">
<p>silêncio consciente</p>
</div>

<script>
/* ======================================================
   SISTEMA GLOBAL DE ÁUDIO (SEM LOOP)
====================================================== */

let currentAudio = null;

function stopAllAudio(){
  if(currentAudio){
    currentAudio.pause();
    currentAudio.currentTime = 0;
    currentAudio = null;
  }
}

function playAudio(src){
  stopAllAudio();
  currentAudio = new Audio(src);
  currentAudio.loop = false;
  currentAudio.play().catch(()=>{});
}

/* ======================================================
   TROCA DE CENAS
====================================================== */

function goTo(pageId){
  stopAllAudio(); // SEMPRE silêncio ao trocar
  document.querySelectorAll(".page")
    .forEach(p=>p.classList.remove("active"));

  document.getElementById(pageId)
    .classList.add("active");
}

/* ======================================================
   CENA 1 → 2
====================================================== */

document.getElementById("btn-comecar")
.onclick=()=>goTo("page-experiencia");


/* ======================================================
   CENA 2 — RESPIRAÇÃO
====================================================== */

const respirarBtn = document.getElementById("btn-respirar");

let inspirarAudio = new Audio("audio/inspirar.mp3");
let expirarAudio  = new Audio("audio/expirar.mp3");

[inspirarAudio,expirarAudio].forEach(a=>{
  a.loop=false;
});

/* SEGURAR = INSPIRAR */
respirarBtn.addEventListener("pointerdown",()=>{
  stopAllAudio();
  inspirarAudio.currentTime=0;
  inspirarAudio.play().catch(()=>{});
  currentAudio=inspirarAudio;
});

/* SOLTAR = EXPIRAR */
function soltarRespiracao(){
  stopAllAudio();
  expirarAudio.currentTime=0;
  expirarAudio.play().catch(()=>{});
  currentAudio=expirarAudio;
}

respirarBtn.addEventListener("pointerup",soltarRespiracao);
respirarBtn.addEventListener("pointerleave",soltarRespiracao);
respirarBtn.addEventListener("touchend",soltarRespiracao);


/* IR PARA CENA 3 */
document.getElementById("btn-continuar")
.onclick=()=>goTo("page-memoria");


/* ======================================================
   CENA 3 — ASMR TOQUE
====================================================== */

const memoriaPage = document.getElementById("page-memoria");

memoriaPage.addEventListener("pointerdown",()=>{
  playAudio("audio/asmr-touch.mp3");
});


/* ======================================================
   CENA 4 — SOM DIFERENTE
====================================================== */

const finalPage = document.getElementById("page-final");

finalPage.addEventListener("pointerdown",()=>{
  playAudio("audio/som-final.mp3");
});

</script>
</body>
</html>
