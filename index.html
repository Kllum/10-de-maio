<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
  <title>Antes de Continuar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body {
      width:100%; height:100%;
      overflow:hidden; overscroll-behavior:none;
      touch-action:none;
      background:rgb(6,8,24);
      font-family:'Georgia', serif;
      color:#fff;
      position:fixed; inset:0;
    }

    /* ── PAGES ── */
    .page {
      position:fixed; inset:0; display:none;
      justify-content:center; align-items:center;
      flex-direction:column;
      touch-action:none; overflow:hidden;
    }
    .page.active { display:flex; }

    /* ── HOME ── */
    #home-content {
      position:relative; z-index:10;
      text-align:center; padding:0 32px; max-width:600px;
      opacity:0; transition:opacity 2.5s ease;
    }
    #home-content.visible { opacity:1; }
    .line-deco {
      width:1px; height:48px; margin:0 auto;
      background:linear-gradient(to bottom, transparent, rgba(180,200,255,0.4));
    }
    .line-deco.down { background:linear-gradient(to bottom,rgba(180,200,255,0.4),transparent); margin-top:40px; }
    .line-deco.top  { margin-bottom:40px; }
    #home-text {
      font-size:clamp(24px,4vw,34px); line-height:1.65;
      letter-spacing:0.04em; color:rgba(220,228,255,0.95);
      font-style:italic; margin:0;
      text-shadow:0 0 40px rgba(100,120,255,0.3);
    }
    #btn-comecar {
      position:relative; z-index:10; margin-top:48px;
      opacity:0; transition:opacity 2s ease;
      background:transparent; border:none;
      border-bottom:1px solid rgba(180,200,255,0.35);
      color:rgba(200,215,255,0.8);
      font-size:17px; letter-spacing:4px; padding:6px 4px;
      cursor:pointer; font-family:'Georgia',serif; text-transform:lowercase;
    }
    #btn-comecar.visible { opacity:1; }

    /* ── EXPERIÊNCIA ── */
    #page-experiencia { background:rgb(6,8,24); }
    #canvas-main, #canvas-particles { position:fixed; inset:0; touch-action:none; }
    #canvas-main    { z-index:1; }
    #canvas-particles { z-index:2; pointer-events:none; }
    #exp-label {
      position:fixed; top:11%; width:100%; text-align:center;
      opacity:0; transition:opacity 1.8s ease;
      font-size:clamp(18px,2.5vw,21px); letter-spacing:2.5px;
      color:rgba(215,228,255,0.92); z-index:10; pointer-events:none;
      text-shadow:0 0 20px rgba(100,140,255,0.3);
    }
    #exp-quote {
      position:fixed; bottom:28%; width:100%; text-align:center;
      opacity:0; transition:opacity 3.5s ease;
      font-size:clamp(22px,3.5vw,30px); letter-spacing:0.04em; line-height:1.7;
      padding:0 28px; color:rgba(230,238,255,0.95);
      z-index:10; pointer-events:none; font-style:italic;
      text-shadow:0 0 30px rgba(80,110,255,0.25);
    }
    #btn-continuar {
      position:fixed; bottom:15%; left:50%; transform:translateX(-50%);
      opacity:0; transition:opacity 2.5s ease;
      pointer-events:none;
      background:transparent; border:none;
      border-bottom:1px solid rgba(200,218,255,0.4);
      color:rgba(215,228,255,0.9);
      padding:8px 6px; font-size:clamp(17px,2vw,19px);
      letter-spacing:4px; cursor:pointer; z-index:20;
      font-family:'Georgia',serif; text-transform:lowercase; white-space:nowrap;
    }

    /* ── MEMÓRIA ── */
    #page-memoria { background:#000; }

    /* Image: starts grayscale opacity-0, animates to color opacity-1 over 30s */
    @keyframes revealColor {
      0%   { opacity:0;   filter: grayscale(1) brightness(0.85) contrast(1.1); }
      8%   { opacity:1;   filter: grayscale(1) brightness(0.9)  contrast(1.1); }
      100% { opacity:1;   filter: grayscale(0) brightness(0.72) contrast(1.08) saturate(1.15); }
    }

    #mem-img {
      position:fixed; inset:0;
      width:100%; height:100%;
      object-fit:cover; object-position:center;
      display:block;
      opacity:0;
      z-index:0;
    }
    #mem-img.animating {
      animation: revealColor 30s ease-in-out forwards;
    }

    #mem-overlay {
      position:fixed; inset:0; z-index:1;
      background:linear-gradient(to top,
        rgba(10,4,2,0.88) 0%,
        rgba(8,4,2,0.4)   42%,
        transparent       72%);
      opacity:0; transition:opacity 5s ease;
    }
    #mem-overlay.visible { opacity:1; }

    #mem-text-wrap {
      position:fixed; bottom:0; left:0; right:0;
      z-index:10; padding:0 36px 10% 36px;
      text-align:center;
      opacity:0; transition:opacity 15s ease;
    }
    #mem-text-wrap.visible { opacity:1; }
    #mem-text {
      font-size:clamp(20px,3vw,26px); line-height:1.95;
      letter-spacing:0.03em; color:rgba(253,242,228,0.97);
      max-width:560px; margin:0 auto;
      font-style:italic;
      text-shadow:0 1px 14px rgba(0,0,0,0.8), 0 4px 28px rgba(0,0,0,0.55);
    }
    #mem-divider {
      width:36px; height:1px;
      background:rgba(230,200,165,0.5);
      margin:28px auto 0;
    }
  </style>
</head>
<body>

<!-- ── HOME ── -->
<div id="page-home" class="page active">
  <canvas id="stars-canvas" style="position:fixed;inset:0;z-index:0;"></canvas>
  <div id="home-content">
    <div class="line-deco top"></div>
    <p id="home-text">&ldquo;Às vezes 30 segundos<br>é só o que precisamos...&rdquo;</p>
    <div class="line-deco down"></div>
  </div>
  <button id="btn-comecar">começar</button>
</div>

<!-- ── EXPERIÊNCIA ── -->
<div id="page-experiencia" class="page">
  <canvas id="canvas-main"></canvas>
  <canvas id="canvas-particles"></canvas>
  <div id="exp-label"></div>
  <div id="exp-quote">&ldquo;Algumas presenças continuam mesmo em silêncio.&rdquo;</div>
  <button id="btn-continuar">continuar &rarr;</button>
</div>

<script>
// ── BLOQUEAR SCROLL / PULL-TO-REFRESH ────────────────────────────────────────
document.addEventListener('touchmove', e => e.preventDefault(), { passive:false });
document.addEventListener('touchstart', e => {
  if (e.target.tagName !== 'BUTTON') e.preventDefault();
}, { passive:false });

// ── NAVEGAÇÃO ─────────────────────────────────────────────────────────────────
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── AUDIO (global — used by both experience and memoria pages) ────────────────
let AC = null;
let breathNodes = null;
let oceanNodes  = null;
let pianoTimer  = null;

function getAC() {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  if (AC.state === 'suspended') AC.resume().catch(()=>{});
  return AC;
}
function makeNoiseBuf(sec) {
  const ac = getAC(), len = ac.sampleRate * sec;
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  return buf;
}
function stopBreath() {
  if (!breathNodes) return;
  try { breathNodes.gain.gain.setTargetAtTime(0, AC.currentTime, 0.3); } catch(e){}
  const n = breathNodes; breathNodes = null;
  setTimeout(() => { try { n.src.stop(); } catch(e){} }, 800);
}
function startBreathSound(isInhale) {
  stopBreath();
  try {
    const ac = getAC();
    const src = ac.createBufferSource();
    src.buffer = makeNoiseBuf(4); src.loop = true;

    if (isInhale) {
      // Inspirar: ruído HIGHPASS = som "shhhhh" de ar entrando (sem ressonância)
      const hpf = ac.createBiquadFilter();
      hpf.type = 'highpass'; hpf.frequency.value = 4000; hpf.Q.value = 0.3;
      const shelf = ac.createBiquadFilter();
      shelf.type = 'highshelf'; shelf.frequency.value = 10000; shelf.gain.value = -8;
      const g = ac.createGain();
      g.gain.setValueAtTime(0, ac.currentTime);
      g.gain.linearRampToValueAtTime(0.18, ac.currentTime + 1.2);
      src.connect(hpf); hpf.connect(shelf); shelf.connect(g); g.connect(ac.destination);
      src.start();
      breathNodes = { src, gain: g };
    } else {
      // Expirar: LOWPASS bem suave = som "hhhhh" de ar saindo, mais grave
      const lpf = ac.createBiquadFilter();
      lpf.type = 'lowpass'; lpf.frequency.value = 800; lpf.Q.value = 0.2;
      // Gain cai devagar simulando ar esvaziando
      const g = ac.createGain();
      g.gain.setValueAtTime(0, ac.currentTime);
      g.gain.linearRampToValueAtTime(0.12, ac.currentTime + 0.6);
      g.gain.linearRampToValueAtTime(0.04, ac.currentTime + 6);
      src.connect(lpf); lpf.connect(g); g.connect(ac.destination);
      src.start();
      breathNodes = { src, gain: g };
    }
  } catch(e){}
}
function startOcean() {
  if (oceanNodes) return;
  try {
    const ac = getAC();
    // Camada 1: rumble grave — som de corpo da onda
    const s1 = ac.createBufferSource();
    s1.buffer = makeNoiseBuf(6); s1.loop = true;
    const lp1 = ac.createBiquadFilter(); lp1.type='lowpass'; lp1.frequency.value=140; lp1.Q.value=0.5;
    const g1 = ac.createGain(); g1.gain.value = 0.6;
    s1.connect(lp1); lp1.connect(g1);

    // Camada 2: médio — espuma quebrando
    const s2 = ac.createBufferSource();
    s2.buffer = makeNoiseBuf(6); s2.loop = true;
    const lp2 = ac.createBiquadFilter(); lp2.type='lowpass'; lp2.frequency.value=380; lp2.Q.value=0.3;
    const hp2 = ac.createBiquadFilter(); hp2.type='highpass'; hp2.frequency.value=120; hp2.Q.value=0.3;
    const g2 = ac.createGain(); g2.gain.value = 0.4;
    s2.connect(lp2); lp2.connect(hp2); hp2.connect(g2);

    // LFO — ritmo de onda entrando e saindo (~7s por ciclo)
    const lfo = ac.createOscillator();
    lfo.type = 'sine'; lfo.frequency.value = 0.14;
    const lfoG = ac.createGain(); lfoG.gain.value = 0.028;
    lfo.connect(lfoG);

    const masterG = ac.createGain();
    masterG.gain.setValueAtTime(0, ac.currentTime);
    masterG.gain.linearRampToValueAtTime(0.085, ac.currentTime + 3);
    lfoG.connect(masterG.gain);

    g1.connect(masterG); g2.connect(masterG); masterG.connect(ac.destination);
    lfo.start(); s1.start(); s2.start();
    oceanNodes = { srcs:[s1,s2], lfo, gain: masterG };
  } catch(e){}
}
function stopOcean() {
  if (!oceanNodes) return;
  try { oceanNodes.gain.gain.setTargetAtTime(0, AC.currentTime, 0.8); } catch(e){}
  const n = oceanNodes; oceanNodes = null;
  setTimeout(() => {
    try { n.srcs.forEach(s=>s.stop()); n.lfo.stop(); } catch(e){}
  }, 2500);
}
function stopAllSounds() {
  stopBreath(); stopOcean();
  if (pianoTimer) { clearTimeout(pianoTimer); pianoTimer = null; }
  if (ytPlayer) { try { ytPlayer.pauseVideo(); } catch(e){} }
}
// ── YOUTUBE PLAYER (música real — When I Lost My Heart To You, Hillsong) ──────
let ytPlayer = null;
let ytReady  = false;

(function loadYTApi() {
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
})();

function onYouTubeIframeAPIReady() {
  const holder = document.createElement('div');
  holder.id = 'yt-holder';
  holder.style.cssText = 'position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;left:-9999px;bottom:0;z-index:-999;';
  document.body.appendChild(holder);

  ytPlayer = new YT.Player('yt-holder', {
    videoId: '2GiLWogTBio',
    playerVars: {
      autoplay: 0, controls: 0, disablekb: 1,
      fs: 0, modestbranding: 1, rel: 0, start: 0
    },
    events: {
      onReady: () => { ytReady = true; }
    }
  });
}

function startPiano() {
  function tryPlay() {
    try {
      if (ytReady && ytPlayer && typeof ytPlayer.playVideo === 'function') {
        ytPlayer.setVolume(38);
        ytPlayer.seekTo(0, true);
        ytPlayer.playVideo();
        // Fade out suavemente nos últimos 5s e para em 1:51 (111s)
        pianoTimer = setTimeout(() => {
          try {
            let vol = 38;
            const fadeInt = setInterval(() => {
              vol -= 2;
              if (vol <= 0) { clearInterval(fadeInt); try { ytPlayer.pauseVideo(); } catch(e){} }
              else { try { ytPlayer.setVolume(vol); } catch(e){} }
            }, 300);
          } catch(e){}
        }, 106000);
      } else {
        pianoTimer = setTimeout(tryPlay, 800);
      }
    } catch(e) { pianoTimer = setTimeout(tryPlay, 800); }
  }
  tryPlay();
}

// ── HOME ──────────────────────────────────────────────────────────────────────
(function initHome() {
  const canvas = document.getElementById('stars-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = Array.from({ length:160 }, () => ({
      x:Math.random()*canvas.width, y:Math.random()*canvas.height,
      r:Math.random()*1.2+0.2, a:Math.random(),
      speed:Math.random()*0.003+0.001, phase:Math.random()*Math.PI*2
    }));
  }
  resize();
  window.addEventListener('resize', resize);

  (function loop() {
    ctx.fillStyle='rgb(6,8,24)'; ctx.fillRect(0,0,canvas.width,canvas.height);
    stars.forEach(s => {
      s.phase+=s.speed;
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle='rgba(200,215,255,'+((Math.sin(s.phase)*0.5+0.5)*s.a)+')'; ctx.fill();
    });
    requestAnimationFrame(loop);
  })();

  setTimeout(() => document.getElementById('home-content').classList.add('visible'), 600);
  setTimeout(() => document.getElementById('btn-comecar').classList.add('visible'), 2200);

  document.getElementById('btn-comecar').addEventListener('click', () => {
    showPage('page-experiencia'); initExperiencia();
  });
})();

// ── EXPERIÊNCIA ───────────────────────────────────────────────────────────────
let expInited = false;
function initExperiencia() {
  if (expInited) return; expInited = true;

  const MC   = document.getElementById('canvas-main');
  const PC   = document.getElementById('canvas-particles');
  const mCtx = MC.getContext('2d');
  const pCtx = PC.getContext('2d');
  const lbl  = document.getElementById('exp-label');
  const quote = document.getElementById('exp-quote');
  const btnC  = document.getElementById('btn-continuar');

  let W, H;
  function resize() { W=MC.width=PC.width=window.innerWidth; H=MC.height=PC.height=window.innerHeight; }
  resize(); window.addEventListener('resize', resize);

  // Phase is driven by setTimeout — NOT per-frame timer checks (avoids skip bugs)
  let phase = 0;
  let bv=0, pressing=false, pressStart=0, showRelease=false;
  let parts=[], stars2=[], consts=[];
  let px=W/2, py=H/2;
  let trails=[], fparts=[], ambients=[];

  function setLabel(t,o){ lbl.textContent=t; lbl.style.opacity=o; }

  // ── Schedule phase transitions with reliable setTimeouts ─────────────────────
  // Phase 0 → 1 after 30s (end of breathing)
  setTimeout(() => {
    phase = 1;
    mCtx.clearRect(0,0,W,H);
    stopAllSounds();
    stars2 = Array.from({length:80},()=>({
      x:Math.random()*W, y:Math.random()*H,
      r:Math.random()<0.2 ? Math.random()*2.5+2.5 : Math.random()*1.5+0.3,
      a:Math.random()*0.7+0.2
    }));
    setLabel('mova o dedo — crie constelações','0.85');
  }, 30000);

  // Phase 1 → 2 after 60s (end of constellations)
  setTimeout(() => {
    phase = 2;
    mCtx.clearRect(0,0,W,H);
    consts = [];
    setLabel('deslize o dedo pela tela','0.85');
  }, 60000);

  // Phase 2 → 3 after 90s (end of touch trails) — silence again
  setTimeout(() => {
    phase = 3;
    stopAllSounds();
    setLabel('','0');
    sendForm();
    setTimeout(()=>{
      quote.style.opacity = '1';
      setTimeout(()=>{
        btnC.style.opacity = '1';
        btnC.style.pointerEvents = 'auto';
      }, 2200);
    }, 800);
  }, 90000);

  function sendForm() {
    try {
      fetch('https://docs.google.com/forms/d/e/1FAIpQLSdwhlo8fdEGi7vjCGlY2FeBCBfhYdnQjgGCLKFCGgceTNnjGw/formResponse',{
        method:'POST',mode:'no-cors',
        headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body:new URLSearchParams({'entry.1196602189':'Jornada concluída!'}).toString()
      }).catch(()=>{});
    } catch(e){}
  }

  function gt(e){ return e.touches?e.touches[0]:e; }
  function onDown(e){
    const t=gt(e); px=t.clientX; py=t.clientY; pressing=true; pressStart=Date.now();
    if(phase===0){ startBreathSound(true); }        // inhale when pressing breath
    else if(phase===2){ startOcean(); }             // ocean when touching blue scene
  }
  function onMove(e){ e.preventDefault();if(!pressing&&phase<1)return;const t=gt(e);px=t.clientX;py=t.clientY; }
  function onUp(){
    pressing=false;
    if(phase===0){ stopBreath(); }                  // silence on release during breathing
    else if(phase===2){ stopOcean(); }              // stop ocean on release
  }

  const expPage = document.getElementById('page-experiencia');
  const isExp = ()=>expPage.classList.contains('active');
  window.addEventListener('touchstart',  e=>{if(isExp())onDown(e);},{passive:false});
  window.addEventListener('touchmove',   e=>{if(isExp())onMove(e);},{passive:false});
  window.addEventListener('touchend',    ()=>{if(isExp())onUp();},  {passive:false});
  window.addEventListener('mousedown',   e=>{if(isExp())onDown(e);});
  window.addEventListener('mousemove',   e=>{if(pressing||phase>=1){px=e.clientX;py=e.clientY;}});
  window.addEventListener('mouseup',    onUp);

  // ── CENA 1: Respiração ───────────────────────────────────────────────────────
  function drawBreath() {
    mCtx.fillStyle='rgba(6,8,24,0.22)'; mCtx.fillRect(0,0,W,H);
    bv = pressing ? Math.min(1,bv+0.016) : Math.max(0,bv-0.004167);
    const r=70+bv*112, ro=r+32*bv;
    const g=mCtx.createRadialGradient(W/2,H/2,r*.6,W/2,H/2,ro);
    g.addColorStop(0,'rgba(160,185,255,'+(0.18*bv)+')'); g.addColorStop(1,'rgba(0,0,0,0)');
    mCtx.beginPath();mCtx.arc(W/2,H/2,ro,0,Math.PI*2);mCtx.fillStyle=g;mCtx.fill();
    mCtx.beginPath();mCtx.arc(W/2,H/2,r,0,Math.PI*2);
    mCtx.strokeStyle='rgba(255,255,255,'+(0.3+0.6*bv)+')';mCtx.lineWidth=1.5+bv*1.8;mCtx.stroke();
    mCtx.beginPath();mCtx.arc(W/2,H/2,r*0.22*bv,0,Math.PI*2);
    mCtx.fillStyle='rgba(200,215,255,'+(0.14*bv)+')';mCtx.fill();
    if(pressing&&bv>0.25&&Math.random()<0.35){
      const a=Math.random()*Math.PI*2;
      parts.push({x:W/2+Math.cos(a)*(r+Math.random()*15),y:H/2+Math.sin(a)*(r+Math.random()*15),
        vx:Math.cos(a)*(0.25+Math.random()*0.5),vy:Math.sin(a)*(0.25+Math.random()*0.5),life:1,size:Math.random()*1.5+0.4});
    }
    const held3s = pressing && Date.now()-pressStart >= 3000;
    if(held3s && !showRelease){
      showRelease = true;
      startBreathSound(false);  // switch to exhale sound after 3s
    }
    if(!pressing && bv < 0.05) showRelease = false;
    setLabel(showRelease ? 'Solte · Expire' : 'Segure · Inspire', '0.88');
    pCtx.clearRect(0,0,W,H);
    parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=0.018;
      if(p.life>0){pCtx.beginPath();pCtx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
        pCtx.fillStyle='rgba(170,205,255,'+p.life+')';pCtx.fill();}});
    parts=parts.filter(p=>p.life>0);
  }

  // ── CENA 2: Constelações ─────────────────────────────────────────────────────
  let lastPressing = false;
  function drawConstellations() {
    // Clear fully when user lifts finger to avoid ghost trail
    if(lastPressing && !pressing) {
      mCtx.clearRect(0,0,W,H);
      consts = [];
    }
    lastPressing = pressing;
    mCtx.fillStyle='rgba(6,8,24,0.12)';mCtx.fillRect(0,0,W,H);
    stars2.forEach(s=>{mCtx.beginPath();mCtx.arc(s.x,s.y,s.r,0,Math.PI*2);
      mCtx.fillStyle='rgba(220,228,255,'+s.a+')';mCtx.fill();});
    if(pressing){consts.push({x:px,y:py});if(consts.length>120)consts.shift();}
    if(consts.length>1){
      mCtx.beginPath();mCtx.moveTo(consts[0].x,consts[0].y);
      consts.forEach((c,i)=>{if(i)mCtx.lineTo(c.x,c.y);});
      mCtx.strokeStyle='rgba(180,210,255,0.35)';mCtx.lineWidth=1;mCtx.stroke();
      consts.forEach((c,i)=>{if(i%6===0){mCtx.beginPath();mCtx.arc(c.x,c.y,2,0,Math.PI*2);
        mCtx.fillStyle='rgba(200,220,255,0.6)';mCtx.fill();}});
    }
  }

  // ── CENA 3: Rastro de luz azul ───────────────────────────────────────────────
  function drawTouch() {
    mCtx.fillStyle='rgba(6,8,24,0.06)';mCtx.fillRect(0,0,W,H);
    // Ambient rising particles — screen is never blank
    if(Math.random()<0.3){
      ambients.push({
        x:Math.random()*W, y:H+10,
        vx:(Math.random()-0.5)*0.6, vy:-(Math.random()*0.8+0.4),
        life:1, size:Math.random()*2+0.6,
        r:Math.floor(100+Math.random()*80), g2:Math.floor(130+Math.random()*90)
      });
    }
    ambients.forEach(a=>{a.x+=a.vx;a.y+=a.vy;a.life-=0.005;});
    ambients=ambients.filter(a=>a.life>0&&a.y>-20);
    // Touch trails on the main canvas
    if(pressing){
      trails.push({x:px,y:py,life:1});
      for(let i=0;i<4;i++){const a=Math.random()*Math.PI*2;
        fparts.push({x:px,y:py,vx:Math.cos(a)*(0.6+Math.random()*2.2),vy:Math.sin(a)*(0.6+Math.random()*2.2),
          life:1,size:Math.random()*2.5+0.8,r:Math.floor(120+Math.random()*110),g2:Math.floor(150+Math.random()*90)});}
    }
    trails.forEach(t=>{t.life-=0.007;if(t.life>0){
      const grd=mCtx.createRadialGradient(t.x,t.y,0,t.x,t.y,85);
      grd.addColorStop(0,'rgba(110,150,255,'+(0.38*t.life)+')');grd.addColorStop(1,'rgba(0,0,0,0)');
      mCtx.beginPath();mCtx.arc(t.x,t.y,85,0,Math.PI*2);mCtx.fillStyle=grd;mCtx.fill();}});
    trails=trails.filter(t=>t.life>0);
    // Particles on overlay canvas
    pCtx.clearRect(0,0,W,H);
    fparts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=0.015;
      if(p.life>0){pCtx.beginPath();pCtx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
        pCtx.fillStyle='rgba('+p.r+','+p.g2+',255,'+p.life+')';pCtx.fill();}});
    fparts=fparts.filter(p=>p.life>0);
    ambients.forEach(a=>{if(a.life>0){pCtx.beginPath();pCtx.arc(a.x,a.y,a.size*a.life,0,Math.PI*2);
      pCtx.fillStyle='rgba('+a.r+','+a.g2+',255,'+(a.life*0.6)+')';pCtx.fill();}});
  }

  function loop() {
    requestAnimationFrame(loop);
    if(!isExp()) return;
    if(phase===0) drawBreath();
    else if(phase===1) drawConstellations();
    else if(phase===2) drawTouch();
    else{ mCtx.fillStyle='rgba(6,8,24,0.04)';mCtx.fillRect(0,0,W,H); }
  }

  btnC.addEventListener('click', goToMemoria);
  btnC.addEventListener('touchend', e=>{e.preventDefault();goToMemoria();});
  setTimeout(()=>setLabel('Segure · Inspire','0.88'),800);
  loop();
}

// ── MEMÓRIA ───────────────────────────────────────────────────────────────────
function goToMemoria() {
  showPage('page-memoria');
  const img     = document.getElementById('mem-img');
  const overlay = document.getElementById('mem-overlay');
  const text    = document.getElementById('mem-text-wrap');

  // Very soft piano notes — starts immediately, very low volume
  startPiano();

  // Trigger: fade in as B&W then gradually colorize over 30s via CSS animation
  requestAnimationFrame(() => img.classList.add('animating'));

  // Overlay gradient appears at 5s so the text has a dark background
  setTimeout(() => overlay.classList.add('visible'), 5000);

  // Quote text starts appearing at 7s, with 15s CSS transition → fully visible at ~22s
  setTimeout(() => text.classList.add('visible'), 7000);
}
